name: flutter_native_bridge
description: A powerful JS-to-Flutter native bridge platform
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # WebView
  webview_flutter: ^4.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Camera
  image_picker: ^1.0.4
  
  # Location
  geolocator: ^10.1.0
  
  # Utilities
  uuid: ^4.2.1
  get_it: ^7.6.4
  
  # Network
  http: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  args: ^2.4.2
  path: ^1.9.0

flutter:
  uses-material-design: true
